name: Auto Translate i18n

on:
  push:
    branches: [master]
    paths:
      - 'src/i18n/zh.json'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Translate new keys
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/translate.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/i18n/en.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/i18n/en.json
          git commit -m "chore: auto-translate new i18n keys [skip ci]"
          git push
